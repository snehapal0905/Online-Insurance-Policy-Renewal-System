{% extends "base.html" %}
{% block title %}Edit Policy{% endblock %}
{% block page_title %}Edit Policy{% endblock %}

{% block content %}
<div style="max-width:520px;">
  <div style="margin-bottom:14px;"><a href="/admin" style="color:var(--brand-mid);font-size:13px;">← Back to Admin</a></div>
  <div class="card" style="padding:24px;">
    <div style="font-size:16px;font-weight:600;margin-bottom:18px;">Edit: {{ policy.policy_number }}</div>
    <form method="POST">
      <div style="margin-bottom:14px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:5px;">Policy Name</label><input style="width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;" type="text" name="name" value="{{ policy.name }}" required></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:5px;">Premium (₹)</label><input style="width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;" type="number" name="premium" value="{{ policy.premium }}" step="0.01" required></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:5px;">Expiry Date</label><input style="width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;" type="date" name="expiry_date" value="{{ policy.expiry_date }}" required></div>
      <div style="margin-bottom:18px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:5px;">Status</label>
        <select style="width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;" name="status">
          <option value="active" {% if policy.status=='active' %}selected{% endif %}>Active</option>
          <option value="expiring" {% if policy.status=='expiring' %}selected{% endif %}>Expiring</option>
          <option value="expired" {% if policy.status=='expired' %}selected{% endif %}>Expired</option>
          <option value="cancelled" {% if policy.status=='cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <div style="display:flex;gap:9px;">
        <a href="/admin" class="btn btn-outline" style="flex:1;justify-content:center;">Cancel</a>
        <button type="submit" class="btn btn-primary" style="flex:2;justify-content:center;">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
